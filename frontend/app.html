<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Builtit — DIY Carpentry Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; background: #f7f5f1; }
    .three-canvas { width: 100%; height: 420px; display:block; border-radius: 12px; background: linear-gradient(180deg, #eef2f7 0%, #d9e0e8 100%); }
    .step-num { background: #c97b4f; color: white; }
    /* Smooth number transitions feel "live" */
    .num { font-variant-numeric: tabular-nums; }
    details summary { cursor: pointer; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    .scrollbar::-webkit-scrollbar { width: 8px; }
    .scrollbar::-webkit-scrollbar-thumb { background: #d4cec3; border-radius: 4px; }
  </style>
</head>

  <div id="root"></div>

  <script src="/app.js?v=2" defer></script>

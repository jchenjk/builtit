<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Builtit — DIY Carpentry Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; background: #f7f5f1; }
    .three-canvas { width: 100%; height: 420px; display:block; border-radius: 12px; background: linear-gradient(180deg, #eef2f7 0%, #d9e0e8 100%); }
    .step-num { background: #c97b4f; color: white; }
    /* Smooth number transitions feel "live" */
    .num { font-variant-numeric: tabular-nums; }
    details summary { cursor: pointer; list-style: none; }
    details summary::-webkit-details-marker { display: none; }
    .scrollbar::-webkit-scrollbar { width: 8px; }
    .scrollbar::-webkit-scrollbar-thumb { background: #d4cec3; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // When served from run_all.py, requests to /api/* are proxied to the backend on
    // the same origin (so API_BASE = ""). When opened directly, fall back to localhost:8000.
    const API_BASE = window.__API_BASE__ ??
      (location.protocol === "file:" ? "http://localhost:8000" : "");

    // ----- API helpers -----
    async function apiListProjects() {
      const r = await fetch(`${API_BASE}/api/projects`);
      if (!r.ok) throw new Error(`Failed to load projects: ${r.status}`);
      return (await r.json()).projects;
    }
    async function apiGenerate(projectId, parameters) {
      const r = await fetch(`${API_BASE}/api/projects/${projectId}/generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ parameters }),
      });
      if (!r.ok) throw new Error(`Failed to generate: ${r.status}`);
      return await r.json();
    }

    // ----- 3D viewer -----
    function ThreeViewer({ parts, bbox }) {
      const mountRef = useRef(null);
      const stateRef = useRef({});

      useEffect(() => {
        const mount = mountRef.current;
        if (!mount) return;
        const width = mount.clientWidth;
        const height = mount.clientHeight;

        const scene = new THREE.Scene();
        scene.background = null;

        const camera = new THREE.PerspectiveCamera(40, width / height, 1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(width, height);
        mount.innerHTML = "";
        mount.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dir = new THREE.DirectionalLight(0xffffff, 0.7);
        dir.position.set(80, 120, 100);
        scene.add(dir);

        // Group to hold all parts
        const group = new THREE.Group();
        scene.add(group);

        // Ground
        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(2000, 2000),
          new THREE.MeshLambertMaterial({ color: 0xece6da })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        scene.add(ground);

        stateRef.current = { scene, camera, renderer, group, mount };

        // Mouse rotation
        let isDown = false, lastX = 0, lastY = 0, theta = Math.PI / 4, phi = Math.PI / 5, dist = 200;
        function updateCamera() {
          const cx = (bbox?.min[0] + bbox?.max[0]) / 2 || 0;
          const cy = (bbox?.min[2] + bbox?.max[2]) / 2 || 0;
          const cz = (bbox?.min[1] + bbox?.max[1]) / 2 || 0;
          camera.position.set(
            cx + dist * Math.cos(phi) * Math.sin(theta),
            cy + dist * Math.sin(phi),
            cz + dist * Math.cos(phi) * Math.cos(theta)
          );
          camera.lookAt(cx, cy, cz);
        }
        stateRef.current.updateCamera = () => updateCamera();

        function onDown(e) { isDown = true; lastX = e.clientX; lastY = e.clientY; }
        function onUp() { isDown = false; }
        function onMove(e) {
          if (!isDown) return;
          theta -= (e.clientX - lastX) * 0.01;
          phi   = Math.max(0.05, Math.min(Math.PI / 2 - 0.05, phi + (e.clientY - lastY) * 0.005));
          lastX = e.clientX; lastY = e.clientY;
          updateCamera();
        }
        function onWheel(e) {
          e.preventDefault();
          dist *= (1 + e.deltaY * 0.001);
          dist = Math.max(40, Math.min(1200, dist));
          updateCamera();
        }
        renderer.domElement.addEventListener("mousedown", onDown);
        window.addEventListener("mouseup", onUp);
        window.addEventListener("mousemove", onMove);
        renderer.domElement.addEventListener("wheel", onWheel, { passive: false });

        let raf;
        const tick = () => { renderer.render(scene, camera); raf = requestAnimationFrame(tick); };
        tick();

        function onResize() {
          const w = mount.clientWidth, h = mount.clientHeight;
          camera.aspect = w / h; camera.updateProjectionMatrix();
          renderer.setSize(w, h);
        }
        window.addEventListener("resize", onResize);

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener("mouseup", onUp);
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("resize", onResize);
          renderer.dispose();
          mount.innerHTML = "";
        };
      }, []);

      // When parts change, rebuild geometry
      useEffect(() => {
        const s = stateRef.current;
        if (!s.group) return;
        while (s.group.children.length) s.group.remove(s.group.children[0]);

        // Convert from app coords (X width, Y depth, Z height) to three.js (X, Y up, Z out)
        // We'll map: x->x, z->y (up), y->z (depth)
        const center = bbox ? [
          (bbox.min[0] + bbox.max[0]) / 2,
          (bbox.min[1] + bbox.max[1]) / 2,
          (bbox.min[2] + bbox.max[2]) / 2,
        ] : [0,0,0];

        (parts || []).forEach(p => {
          const geom = new THREE.BoxGeometry(p.dx, p.dz, p.dy);
          const mat = new THREE.MeshLambertMaterial({ color: p.color || "#c69c6d" });
          const mesh = new THREE.Mesh(geom, mat);
          mesh.position.set(
            (p.x + p.dx / 2) - center[0],
            (p.z + p.dz / 2) - center[2],
            (p.y + p.dy / 2) - center[1]
          );
          // wireframe overlay
          const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(geom),
            new THREE.LineBasicMaterial({ color: 0x4a3520, linewidth: 1, transparent: true, opacity: 0.5 })
          );
          mesh.add(edges);
          s.group.add(mesh);
        });

        // Compute distance from bbox span
        const span = bbox ? Math.max(
          bbox.max[0] - bbox.min[0],
          bbox.max[1] - bbox.min[1],
          bbox.max[2] - bbox.min[2]
        ) : 100;
        s.dist = span * 1.6;
        if (s.updateCamera) {
          // Update internal camera reference distance too — simplest approach: re-init dist
          s.dist = Math.max(80, span * 1.6);
        }
        if (s.updateCamera) s.updateCamera();
      }, [parts, bbox]);

      return <div ref={mountRef} className="three-canvas" />;
    }

    // ----- UI atoms -----
    function NumberInput({ label, value, onChange, min, max, step, unit }) {
      return (
        <label className="block">
          <div className="text-xs font-semibold text-stone-600 mb-1 uppercase tracking-wide">{label}</div>
          <div className="flex items-center gap-2">
            <input
              type="range" min={min} max={max} step={step || 1}
              value={value} onChange={e => onChange(Number(e.target.value))}
              className="flex-1 accent-orange-700"
            />
            <input
              type="number" value={value} min={min} max={max} step={step || 1}
              onChange={e => onChange(Number(e.target.value))}
              className="w-20 px-2 py-1 border border-stone-300 rounded text-sm"
            />
            <span className="text-xs text-stone-500 w-6">{unit}</span>
          </div>
        </label>
      );
    }
    function BoolInput({ label, value, onChange }) {
      return (
        <label className="flex items-center gap-2 select-none">
          <input type="checkbox" checked={!!value} onChange={e => onChange(e.target.checked)}
                 className="w-4 h-4 accent-orange-700" />
          <span className="text-sm text-stone-700">{label}</span>
        </label>
      );
    }

    function ParamForm({ schema, values, onChange }) {
      return (
        <div className="space-y-4">
          {schema.parameters.map(p => {
            if (p.kind === "boolean") {
              return <BoolInput key={p.key} label={p.label}
                                value={values[p.key]} onChange={v => onChange(p.key, v)} />;
            }
            return (
              <div key={p.key}>
                <NumberInput label={p.label} value={values[p.key]}
                             onChange={v => onChange(p.key, v)}
                             min={p.min} max={p.max} step={p.step} unit={p.unit} />
                {p.help && <div className="text-xs text-stone-500 mt-1">{p.help}</div>}
              </div>
            );
          })}
        </div>
      );
    }

    function ShoppingList({ data }) {
      if (!data) return null;
      const [quotes, setQuotes] = useState(null);       // catalog_id -> quote
      const [liveState, setLiveState] = useState("idle"); // idle | loading | done | error
      const [liveEnabled, setLiveEnabled] = useState(null);
      const [zip, setZip] = useState("");

      useEffect(() => {
        // Reset live quotes when the build changes
        setQuotes(null); setLiveState("idle");
        fetch(`${API_BASE}/api/prices/status`)
          .then(r => r.json()).then(d => setLiveEnabled(d.live_enabled))
          .catch(() => setLiveEnabled(false));
      }, [data]);

      const fetchLive = async () => {
        setLiveState("loading");
        try {
          const ids = [...new Set(data.lines.map(l => l.catalog_id))];
          const body = { catalog_ids: ids };
          if (/^\d{5}$/.test(zip)) body.zip_code = zip;
          const r = await fetch(`${API_BASE}/api/prices/live`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const d = await r.json();
          const map = {};
          d.quotes.forEach(q => { map[q.catalog_id] = q; });
          setQuotes(map);
          setLiveState("done");
        } catch (e) {
          setLiveState("error");
        }
      };

      const grouped = useMemo(() => {
        const g = { lumber: [], panel: [], hardware: [] };
        data.lines.forEach(l => g[l.kind] && g[l.kind].push(l));
        return g;
      }, [data]);

      const priceFor = (l) => {
        const q = quotes?.[l.catalog_id];
        return q ? q.price : l.unit_price;
      };
      const liveTotal = useMemo(() => {
        if (!quotes) return null;
        return data.lines.reduce((s, l) => s + priceFor(l) * l.qty, 0);
      }, [quotes, data]);
      const anyLive = quotes && Object.values(quotes).some(q => q.fetched_live);

      const Section = ({ title, lines }) => lines.length ? (
        <div className="mb-4">
          <div className="text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">{title}</div>
          <div className="divide-y divide-stone-200 border border-stone-200 rounded-lg bg-white">
            {lines.map((l, i) => {
              const q = quotes?.[l.catalog_id];
              const unit = priceFor(l);
              const isLive = q?.fetched_live;
              return (
                <div key={i} className="p-3 flex items-start justify-between gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="font-medium text-stone-800 text-sm flex items-center gap-2">
                      {l.name}
                      {isLive && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-orange-100 text-orange-700 font-semibold uppercase tracking-wide">live</span>}
                    </div>
                    <div className="text-xs text-stone-500 mt-0.5">
                      {l.vendor} · {l.details?.notes || `${l.qty} × $${unit.toFixed(2)}`}
                      {isLive && q.link && <> · <a href={q.link} target="_blank" rel="noreferrer" className="text-orange-600 hover:underline">view item ↗</a></>}
                    </div>
                    {isLive && q.title && q.title !== l.name &&
                      <div className="text-[11px] text-stone-400 mt-0.5 truncate">matched: {q.title}</div>}
                  </div>
                  <div className="text-right">
                    <div className="text-sm font-semibold num text-stone-800">${(unit * l.qty).toFixed(2)}</div>
                    <div className="text-xs text-stone-500 num">qty {l.qty}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ) : null;

      return (
        <div>
          <div className="mb-4 p-3 rounded-lg border border-orange-200 bg-orange-50 flex flex-wrap items-center gap-2">
            <div className="text-xs text-orange-800 flex-1 min-w-[180px]">
              {liveEnabled === false
                ? "Live pricing not configured on this server — showing catalog estimates."
                : "Pull today's Home Depot prices for this shopping list."}
            </div>
            <input value={zip} onChange={e => setZip(e.target.value.replace(/\D/g, "").slice(0, 5))}
                   placeholder="ZIP (optional)" disabled={liveEnabled === false}
                   className="w-28 px-2 py-1.5 text-xs rounded border border-orange-200 bg-white disabled:opacity-50" />
            <button onClick={fetchLive} disabled={liveState === "loading" || liveEnabled === false}
                    className="px-3 py-1.5 text-xs font-semibold rounded bg-orange-600 text-white hover:bg-orange-700 disabled:opacity-50">
              {liveState === "loading" ? "Fetching…" : "Get live prices"}
            </button>
            {liveState === "error" && <div className="w-full text-xs text-red-600">Couldn't fetch live prices — showing estimates.</div>}
            {liveState === "done" && !anyLive && <div className="w-full text-xs text-orange-700">Live lookup unavailable right now — showing catalog estimates.</div>}
          </div>
          <Section title="Lumber" lines={grouped.lumber} />
          <Section title="Sheet goods" lines={grouped.panel} />
          <Section title="Hardware & finish" lines={grouped.hardware} />
          <div className="mt-6 p-4 rounded-lg bg-stone-900 text-white flex items-baseline justify-between">
            <div>
              <div className="text-xs uppercase tracking-wide opacity-70">{anyLive ? "Total (live prices)" : "Estimated total"}</div>
              <div className="text-xs opacity-60 mt-1">
                {anyLive ? "Live Home Depot prices; items without a match use catalog estimates. Tax not included."
                         : "Tax not included. Prices reflect typical Home Depot stock."}
              </div>
            </div>
            <div className="text-3xl font-bold num">${(liveTotal ?? data.total_cost).toFixed(2)}</div>
          </div>
        </div>
      );
    }

    function CutDiagrams({ diagrams }) {
      if (!diagrams || diagrams.length === 0) return null;
      return (
        <div className="space-y-4">
          {diagrams.map((d, i) => (
            <details key={i} className="border border-stone-200 rounded-lg bg-white overflow-hidden" open={i === 0}>
              <summary className="p-3 bg-stone-50 hover:bg-stone-100 flex items-center justify-between">
                <div>
                  <div className="font-medium text-sm text-stone-800">{d.stock_name}</div>
                  <div className="text-xs text-stone-500">{d.pieces.length} board(s)</div>
                </div>
                <div className="text-stone-400 text-xs">click to expand</div>
              </summary>
              <div className="p-3 space-y-3">
                {d.pieces.map((piece, j) => {
                  const total = d.stock_length_in;
                  const cuts = piece.cuts;
                  return (
                    <div key={j}>
                      <div className="text-xs font-semibold text-stone-600 mb-1">Board #{piece.stock_index} — {total}" stock, {piece.leftover_in}" leftover</div>
                      <div className="flex h-8 rounded overflow-hidden border border-stone-300 bg-stone-100">
                        {cuts.map((c, k) => {
                          const colors = ["#c97b4f", "#c69c6d", "#a87b4f", "#d6b48a", "#8b5a2b"];
                          return (
                            <div key={k}
                                 style={{ width: `${(c.length_in / total) * 100}%`, background: colors[k % colors.length] }}
                                 className="flex items-center justify-center text-white text-xs font-medium border-r border-stone-50/40">
                              {c.length_in}"
                            </div>
                          );
                        })}
                        <div style={{ width: `${(piece.leftover_in / total) * 100}%` }}
                             className="bg-stone-200 flex items-center justify-center text-stone-500 text-xs">
                          waste
                        </div>
                      </div>
                      <div className="flex flex-wrap gap-x-3 mt-1 text-xs text-stone-500">
                        {cuts.map((c, k) => <span key={k}>• {c.name}</span>)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </details>
          ))}
        </div>
      );
    }

    function Instructions({ data }) {
      if (!data) return null;
      const hours = (data.estimated_total_minutes / 60).toFixed(1);
      return (
        <div>
          <div className="grid grid-cols-2 gap-3 mb-5">
            <div className="bg-white border border-stone-200 rounded-lg p-3">
              <div className="text-xs uppercase tracking-wide text-stone-500">Estimated time</div>
              <div className="text-2xl font-bold mt-0.5 num text-stone-800">{hours} <span className="text-sm font-normal text-stone-500">hours</span></div>
            </div>
            <div className="bg-white border border-stone-200 rounded-lg p-3">
              <div className="text-xs uppercase tracking-wide text-stone-500">Steps</div>
              <div className="text-2xl font-bold mt-0.5 num text-stone-800">{data.steps.length}</div>
            </div>
          </div>

          <div className="mb-5">
            <div className="text-xs uppercase tracking-wide font-semibold text-stone-600 mb-2">Tools you'll need</div>
            <ul className="grid grid-cols-1 sm:grid-cols-2 gap-1 text-sm text-stone-700">
              {data.tools.map((t, i) => <li key={i} className="flex gap-2"><span className="text-orange-700">•</span>{t}</li>)}
            </ul>
          </div>

          <div className="space-y-3">
            {data.steps.map(s => (
              <div key={s.step} className="bg-white border border-stone-200 rounded-lg p-4 flex gap-4">
                <div className="step-num w-9 h-9 rounded-full flex items-center justify-center font-bold flex-shrink-0">{s.step}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between gap-2 mb-1">
                    <h4 className="font-semibold text-stone-800">{s.title}</h4>
                    <span className="text-xs text-stone-500 num flex-shrink-0">~{s.estimated_minutes} min</span>
                  </div>
                  <p className="text-sm text-stone-600 leading-relaxed">{s.body}</p>
                </div>
              </div>
            ))}
          </div>

          {data.tips && data.tips.length > 0 && (
            <div className="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-lg">
              <div className="text-xs uppercase tracking-wide font-semibold text-amber-800 mb-2">Pro tips</div>
              <ul className="space-y-1 text-sm text-amber-900">
                {data.tips.map((t, i) => <li key={i}>• {t}</li>)}
              </ul>
            </div>
          )}

          <div className="mt-6 p-4 bg-red-50 border border-red-200 rounded-lg">
            <div className="text-xs uppercase tracking-wide font-semibold text-red-800 mb-2">Safety</div>
            <ul className="space-y-1 text-sm text-red-900">
              {data.safety.map((s, i) => <li key={i}>• {s}</li>)}
            </ul>
          </div>
        </div>
      );
    }

    // ----- Page -----
    function App() {
      const [projects, setProjects] = useState([]);
      const [selected, setSelected] = useState(null);
      const [params, setParams] = useState({});
      const [build, setBuild] = useState(null);
      const [tab, setTab] = useState("model");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(null);

      // Load projects on mount
      useEffect(() => {
        apiListProjects()
          .then(ps => {
            setProjects(ps);
            const first = ps[0];
            if (first) {
              setSelected(first);
              const def = {};
              first.parameters.forEach(p => def[p.key] = p.default);
              setParams(def);
            }
          })
          .catch(e => setErr(e.message));
      }, []);

      // Regenerate whenever params change (debounced)
      useEffect(() => {
        if (!selected) return;
        const t = setTimeout(() => {
          setLoading(true);
          apiGenerate(selected.id, params)
            .then(d => { setBuild(d); setLoading(false); setErr(null); })
            .catch(e => { setErr(e.message); setLoading(false); });
        }, 200);
        return () => clearTimeout(t);
      }, [selected, params]);

      const onPickProject = (p) => {
        setSelected(p);
        const def = {};
        p.parameters.forEach(x => def[x.key] = x.default);
        setParams(def);
        setBuild(null);
      };

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-stone-900 text-white">
            <div className="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
              <div>
                <div className="flex items-center gap-2">
                  <div className="w-8 h-8 rounded bg-orange-600 flex items-center justify-center font-bold">B</div>
                  <h1 className="text-xl font-bold tracking-tight">Builtit</h1>
                </div>
                <p className="text-xs text-stone-400 mt-1">DIY carpentry, designed for beginners. Pick a project, tweak the dimensions, build it.</p>
              </div>
              <div className="text-right text-xs text-stone-400">
                <div>API: <span className={err ? "text-red-400" : "text-green-400"}>{err ? "offline" : "connected"}</span></div>
                <div>{API_BASE}</div>
              </div>
            </div>
          </header>

          {err && (
            <div className="bg-red-50 border-b border-red-200 px-6 py-3 text-sm text-red-800">
              <strong>Could not reach the backend.</strong> Make sure the FastAPI server is running on {API_BASE}. ({err})
            </div>
          )}

          {/* Project picker */}
          <div className="max-w-7xl mx-auto px-6 py-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
              {projects.map(p => (
                <button key={p.id} onClick={() => onPickProject(p)}
                        className={`text-left p-4 rounded-xl border-2 transition-all ${
                          selected?.id === p.id
                            ? "border-orange-600 bg-orange-50 shadow-sm"
                            : "border-stone-200 bg-white hover:border-stone-400"
                        }`}>
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <div className="font-bold text-stone-800">{p.name}</div>
                      <div className="text-xs text-stone-500 mt-0.5">{p.difficulty} · ~{p.estimated_time_hours}h</div>
                    </div>
                    {selected?.id === p.id && <div className="text-orange-600 text-xs font-semibold">SELECTED</div>}
                  </div>
                  <div className="text-sm text-stone-600 mt-2 leading-snug">{p.description}</div>
                </button>
              ))}
            </div>

            {/* Main work area */}
            {selected && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                {/* Left: parameters */}
                <aside className="lg:col-span-3 bg-white p-5 rounded-xl border border-stone-200 h-fit sticky top-4">
                  <h3 className="font-bold text-stone-800 mb-1">{selected.name}</h3>
                  <p className="text-xs text-stone-500 mb-4">Adjust to fit your space. Numbers update live.</p>
                  <ParamForm schema={selected} values={params}
                             onChange={(k, v) => setParams(s => ({ ...s, [k]: v }))} />
                </aside>

                {/* Right: tabs */}
                <main className="lg:col-span-9">
                  <div className="flex gap-1 mb-4 bg-stone-200 p-1 rounded-lg w-fit">
                    {[
                      ["model", "3D Model"],
                      ["shopping", "Shopping List"],
                      ["cuts", "Cut Diagrams"],
                      ["instructions", "Instructions"],
                    ].map(([k, label]) => (
                      <button key={k} onClick={() => setTab(k)}
                              className={`px-4 py-2 rounded-md text-sm font-medium transition ${
                                tab === k ? "bg-white text-stone-900 shadow-sm" : "text-stone-600 hover:text-stone-900"
                              }`}>
                        {label}
                      </button>
                    ))}
                  </div>

                  <div className="relative">
                    {loading && (
                      <div className="absolute top-2 right-2 z-10 bg-white/80 backdrop-blur px-2 py-1 rounded text-xs text-stone-600">
                        recalculating…
                      </div>
                    )}

                    {tab === "model" && build && (
                      <div className="bg-white p-4 rounded-xl border border-stone-200">
                        <ThreeViewer parts={build.model_3d.parts} bbox={build.model_3d.bbox} />
                        <div className="text-xs text-stone-500 mt-2 text-center">
                          drag to rotate · scroll to zoom · {build.model_3d.parts.length} parts
                        </div>
                      </div>
                    )}

                    {tab === "shopping" && build && (
                      <div className="bg-stone-50 p-4 rounded-xl border border-stone-200">
                        <ShoppingList data={build.shopping_list} />
                      </div>
                    )}

                    {tab === "cuts" && build && (
                      <div className="bg-stone-50 p-4 rounded-xl border border-stone-200">
                        <p className="text-sm text-stone-600 mb-3">
                          Each row shows how cuts pack onto a single stock board. Mark these layouts on your lumber before you start cutting — it saves a trip back to the store.
                        </p>
                        <CutDiagrams diagrams={build.shopping_list.cut_diagrams} />
                      </div>
                    )}

                    {tab === "instructions" && build && (
                      <div className="bg-stone-50 p-4 rounded-xl border border-stone-200">
                        <Instructions data={build.instructions} />
                      </div>
                    )}

                    {!build && !err && (
                      <div className="bg-white p-12 rounded-xl border border-stone-200 text-center text-stone-500">
                        Loading your build…
                      </div>
                    )}
                  </div>
                </main>
              </div>
            )}
          </div>

          <footer className="max-w-7xl mx-auto px-6 py-8 text-xs text-stone-500">
            Built with FastAPI, React, and Three.js. Prices are illustrative — wire in a live data source for production.
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
